apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: nanobot
data:
  settings.yml: |
    use_default_settings: true

    general:
      debug: false
      instance_name: "nanobot-searxng"
      privacypolicy_url: false
      donation_url: false
      contact_url: false
      enable_metrics: false

    server:
      # Secret key is set via SEARXNG_SECRET env var
      bind_address: "0.0.0.0"
      port: 8080
      base_url: false
      limiter: false
      public_instance: false
      image_proxy: false

    ui:
      static_use_hash: true

    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en"
      formats:
        - html
        - json

    engines:
      - name: google
        engine: google
        disabled: false
      - name: bing
        engine: bing
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        disabled: false
      - name: wikipedia
        engine: wikipedia
        disabled: false
